<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Agent Status</title>
    <style>
        :root {
            --bg-color: #1a1b26;
            --card-bg: #24283b;
            --text-primary: #c0caf5;
            --text-secondary: #565f89;
            --accent: #7aa2f7;
            --success: #9ece6a;
            --error: #f7768e;
            --warning: #e0af68;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        h2 {
            margin-top: 0;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
            font-size: 1.2rem;
            color: var(--accent);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .label {
            font-weight: 500;
        }

        .value {
            font-family: monospace;
            font-size: 1.1rem;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .status-online {
            background-color: rgba(158, 206, 106, 0.2);
            color: var(--success);
        }

        .status-offline {
            background-color: rgba(247, 118, 142, 0.2);
            color: var(--error);
        }

        .progress-bar {
            background-color: #414868;
            border-radius: 4px;
            height: 8px;
            width: 100%;
            margin-top: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--accent);
            transition: width 0.5s ease-in-out;
        }

        .refresh-info {
            grid-column: 1 / -1;
            text-align: right;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- System Health -->
        <div class="card">
            <h2>System Resources</h2>
            <div class="stat">
                <div class="stat-row">
                    <span class="label">CPU Usage</span>
                    <span class="value" id="cpu-val">--%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="cpu-bar" style="width: 0%"></div>
                </div>
            </div>
            <br>
            <div class="stat">
                <div class="stat-row">
                    <span class="label">Memory Usage</span>
                    <span class="value" id="mem-val">--%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="mem-bar" style="width: 0%"></div>
                </div>
            </div>
            <br>
            <div class="stat">
                <div class="stat-row">
                    <span class="label">Disk Usage</span>
                    <span class="value" id="disk-val">--%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="disk-bar" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- Network Status -->
        <div class="card">
            <h2>Network Connectivity</h2>
            <div class="stat-row">
                <span class="label">Internet Access</span>
                <span class="status-badge" id="net-internet">Checking...</span>
            </div>
            <div class="stat-row">
                <span class="label">OPNsense API</span>
                <span class="status-badge" id="net-opnsense">Checking...</span>
            </div>
            <div style="font-size: 0.8rem; color: #565f89; margin-top: 10px;" id="opnsense-detail">
                Details: --
            </div>
        </div>

        <!-- Agent Status -->
        <div class="card">
            <h2>AI Agent Status</h2>
            <div class="stat-row">
                <span class="label">vLLM Engine</span>
                <span class="status-badge" id="agent-vllm">Checking...</span>
            </div>
            <div class="stat-row">
                <span class="label">Model Loaded</span>
                <span class="status-badge" id="agent-model">Checking...</span>
            </div>
            <div style="font-size: 0.8rem; color: #565f89; margin-top: 10px;">
                Agents: OPNsense, WireGuard
            </div>
        </div>

        <div class="refresh-info" id="last-updated">Last updated: Never</div>
    </div>

    <script>
        function updateStatus(elementId, isOnline, text = null) {
            const el = document.getElementById(elementId);
            if (isOnline) {
                el.className = "status-badge status-online";
                el.textContent = text || "ONLINE";
            } else {
                el.className = "status-badge status-offline";
                el.textContent = text || "OFFLINE";
            }
        }


        async function fetchStatusClean() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();

                // System
                document.getElementById('cpu-val').textContent = data.system.cpu_percent + '%';
                document.getElementById('cpu-bar').style.width = data.system.cpu_percent + '%';

                document.getElementById('mem-val').textContent = data.system.memory_percent + '%';
                document.getElementById('mem-bar').style.width = data.system.memory_percent + '%';

                document.getElementById('disk-val').textContent = data.system.disk_percent + '%';
                document.getElementById('disk-bar').style.width = data.system.disk_percent + '%';

                // Network
                updateStatus('net-internet', data.network.internet);
                updateStatus('net-opnsense', data.network.opnsense);
                document.getElementById('opnsense-detail').textContent = "Details: " + data.network.opnsense_details;

                // Agent
                updateStatus('agent-vllm', data.agent.vllm_status);
                updateStatus('agent-model', data.agent.model_loaded);

                // Timestamp
                document.getElementById('last-updated').textContent = "Last updated: " + new Date().toLocaleTimeString();

            } catch (error) {
                console.error('Error fetching status:', error);
            }
        }

        // Initial fetch
        fetchStatusClean();

        // Poll every 5 seconds
        setInterval(fetchStatusClean, 5000);
    </script>
</body>

</html>
