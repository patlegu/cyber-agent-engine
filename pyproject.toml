[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "cyber-agent-engine"
version = "1.0.0"
description = "Autonomous factory component for LoRA generation and network agents"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0.0",
    "httpx>=0.25.0",
    "pyyaml>=6.0",
    "jinja2>=3.0.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["factory*"]
